# Configuration for ALE/Breakout-v5
n_train_steps: 10000000

ppo_params:
  learning_rate: 2.5e-4
  n_steps: 128
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.01
  verbose: 1

# Parameters that should use linear_schedule
schedule_params:
  - learning_rate
  - clip_range

policy:
  name: "CnnPolicy"
  kwargs:
    features_extractor_class: "CustomCNN"
    features_extractor_kwargs:
      features_dim: 128
    activation_fn: "ReLU"
    net_arch:
      pi: [256]
      vf: [256]
